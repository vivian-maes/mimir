# Manifest du profil Hermes « mimir » — COUCHE 2 (opt-in, jamais requise).
#
# Schéma OFFICIEL Hermes (website/docs/user-guide/profile-distributions.md) :
#   name (requis), version, description, author, license, hermes_requires,
#   env_requires[], distribution_owned[].
# `hermes profile install <git-url>` clone le repo et COPIE TOUT le repo dans
# ~/.hermes/profiles/mimir/ (sauf .env, auth.json, memories/, sessions/).
# → il n'y a PAS de clé `files:` ; tout ce qui est à la racine du repo est copié
#   (SOUL.md, config.yaml, skills/, etc. doivent donc vivre à la racine).
#
#   hermes profile install https://github.com/vivian-maes/mimir.git
#   hermes -p mimir chat
#
# Modèle/LLM : NON défini ici — le profil hérite du modèle du profil par défaut
# (sinon `mimir setup`). Gateway & cron de synchro : voir backlog (v0.4.0).
# Réf. __projet__/SPEC.md §11.

name: mimir
version: "0.3.4"
description: "Curateur Mimir — entretient un wiki Obsidian (méthode Karpathy) : extrait des sources, compile par notion, indexe et synchronise."
author: Vivian MAES
license: Proprietary

# Fichiers « possédés » par la distribution : remplacés à chaque mise à jour
# (le reste du repo copié est préservé s'il a été modifié localement).
distribution_owned:
  - SOUL.md
  - config.yaml
  - skills/
