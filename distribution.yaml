# Manifest du profil Hermes « wiki-curator » — COUCHE 2 (opt-in, jamais requise).
#
# Format : manifest PLAT (name/version/description/author/files) à la RACINE du
# repo. `hermes profile install <git-url>` clone le repo, lit ce fichier, et
# COPIE les chemins de `files:` dans ~/.hermes/profiles/wiki-curator/.
# C'est pourquoi SOUL.md et config.yaml vivent à la racine : ils doivent atterrir
# à la racine du dossier de profil.
#
#   hermes profile install https://github.com/vivian-maes/mimir.git
#
# Réf. __projet__/SPEC.md §11 ; __projet__/_analyse_DevOps/hermes-sous-agents-vs-skills.md.

name: wiki-curator
version: "0.3.2"
description: >
  Curateur Mimir — entretient un wiki Obsidian (méthode Karpathy) à partir d'un
  flux de sources : extrait, compile par notion, indexe, et synchronise.
author: Vivian MAES

# Fichiers copiés dans le dossier du profil (relatifs à la racine du repo).
files:
  - SOUL.md                    # persona (identité persistante)
  - config.yaml                # config de l'agent (external_dirs, MIMIR_CONFIG)
  - skills/                    # les 5 skills wiki-* + _shared-references
  - filters.txt                # template d'exclusions rclone
  - wiki.config.example.json   # exemple de wiki.config.json
