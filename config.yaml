# Configuration de l'agent Hermes pour le profil mimir.
# Valeurs d'EXEMPLE (chemins génériques) — à adapter au déploiement réel.
# NB : schéma suivant l'exemple documenté (hermes-remontee §6.2) — à valider
# contre ta version d'Hermes ; les clés inconnues sont en principe ignorées.
#
# MODÈLE / LLM : volontairement NON défini ici. Hermes fournit le modèle au
# profil / à la session (comme un skill sous Claude Code utilise le modèle de la
# session). Mimir reste model-agnostique.

# Skills : les 5 wiki-* sont EMBARQUÉS (copiés dans skills/ à l'install). Le profil
# n'est PAS verrouillé sur eux : les OUTILS DE BASE d'Hermes (fichiers, web,
# terminal) restent disponibles, et le hub est ouvert pour ajouter des skills
# généralistes. (« N compétences » dans le dashboard ne compte que les skills
# custom, pas les outils de base.)
skills:
  hub:
    auto_update: false      # contrôle manuel des mises à jour
    security_scan: true     # scanner les skills avant activation
  # Boucle de DEV uniquement (clone local rechargé direct) — sinon laisser commenté :
  # external_dirs:
  #   - /chemin/absolu/vers/mimir/skills

# Délégation : permet à l'agent de paralléliser (compilation de masse, audits de
# liens) via delegate_task → sub-agents jetables. Modèle hérité de l'hôte (non figé).
delegation:
  max_iterations: 30

# Pointeur vers la config runtime Mimir (work_root, layout, sync.backend).
# Voir wiki.config.example.json à la racine du repo pour le schéma complet.
mimir:
  config: /chemin/absolu/vers/wiki.config.json

# Variables d'environnement exportées à l'agent ET à ses skills/cron.
# MIMIR_CONFIG active l'auto-découverte : les 5 skills n'ont alors PLUS besoin de
# --config (résolution : $MIMIR_CONFIG → ~/.config/mimir/wiki.config.json → ./).
# Garder cette valeur cohérente avec mimir.config ci-dessus (même chemin).
env:
  MIMIR_CONFIG: /chemin/absolu/vers/wiki.config.json
  # Jeton GitHub pour le tap (anti rate-limit : 5 000 req/h au lieu de 60).
  # À placer plutôt dans ~/.hermes/.env que versionné. Scope : public_repo.
  # GITHUB_TOKEN: "ghp_xxx"
