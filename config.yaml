# Configuration de l'agent Hermes pour le profil wiki-curator.
# Valeurs d'EXEMPLE (chemins génériques) — à adapter au déploiement réel.
#
# Installé via `hermes profile install`, le profil EMBARQUE déjà les skills
# (copiés dans son dossier `skills/`) : pas besoin d'external_dirs. Le bloc
# ci-dessous n'est utile qu'en BOUCLE DE DEV (clone local, rechargé direct).
# skills:
#   external_dirs:
#     - /chemin/absolu/vers/mimir/skills

# Pointeur vers la config runtime Mimir (work_root, layout, sync.backend).
# Voir wiki.config.example.json à la racine du repo pour le schéma complet.
mimir:
  config: /chemin/absolu/vers/wiki.config.json

# Variables d'environnement exportées à l'agent ET à ses skills/cron.
# MIMIR_CONFIG active l'auto-découverte : les 5 skills n'ont alors PLUS besoin de
# --config (résolution : $MIMIR_CONFIG → ~/.config/mimir/wiki.config.json → ./).
# Garder cette valeur cohérente avec mimir.config ci-dessus (même chemin).
env:
  MIMIR_CONFIG: /chemin/absolu/vers/wiki.config.json
  # Jeton GitHub pour le tap (anti rate-limit : 5 000 req/h au lieu de 60).
  # À placer plutôt dans ~/.hermes/.env que versionné. Scope : public_repo.
  # GITHUB_TOKEN: "ghp_xxx"
